<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Front-End Sales Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Sales Dashboard</h1>
  <div id="total-sales">Total Sales: $0.00</div>
</header>

<main>
  <section class="products">
    <div class="product" data-price="1.00" data-name="Candy">
      <div class="badge">0</div>
      <img src="https://via.placeholder.com/100?text=Candy" alt="Candy">
      <p>Candy - $1.00</p>
      <button class="sell-btn">Sell</button>
    </div>
    <div class="product" data-price="1.00" data-name="Soda">
      <div class="badge">0</div>
      <img src="https://via.placeholder.com/100?text=Soda" alt="Soda">
      <p>Soda - $1.00</p>
      <button class="sell-btn">Sell</button>
    </div>
    <div class="product" data-price="1.00" data-name="Gatorade">
      <div class="badge">0</div>
      <img src="https://via.placeholder.com/100?text=Gatorade" alt="Gatorade">
      <p>Gatorade - $1.00</p>
      <button class="sell-btn">Sell</button>
    </div>
    <!-- Add more products similarly -->
  </section>

  <section class="sales-table-section">
    <h2>Product Sales Summary</h2>
    <table id="sales-table">
      <thead>
        <tr>
          <th>Product</th>
          <th>Units Sold</th>
          <th>Revenue ($)</th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows will be dynamically added -->
      </tbody>
    </table>
  </section>
</main>

<footer>
  <p>&copy; 2026 Sales Dashboard</p>
</footer>

<script>
let totalSales = 0;
const totalSalesDiv = document.getElementById('total-sales');
const salesTableBody = document.querySelector('#sales-table tbody');

// Object to track sales per product
const productSales = {};

// Initialize table rows for each product
document.querySelectorAll('.product').forEach(prod => {
  const name = prod.dataset.name;
  productSales[name] = { units: 0, revenue: 0 };
  
  const row = document.createElement('tr');
  row.id = `row-${name.replace(/\s+/g, '-')}`;
  row.innerHTML = `<td>${name}</td><td>0</td><td>0.00</td>`;
  salesTableBody.appendChild(row);
});

// Button click handler
document.querySelectorAll('.sell-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const productDiv = btn.closest('.product');
    const name = productDiv.dataset.name;
    const price = parseFloat(productDiv.dataset.price);
    const badge = productDiv.querySelector('.badge');

    // Update badge count
    let count = parseInt(badge.textContent);
    count++;
    badge.textContent = count;

    // Highlight product
    productDiv.classList.add('sold');

    // Update total sales
    totalSales += price;
    totalSalesDiv.textContent = "Total Sales: $" + totalSales.toFixed(2);

    // Update product-specific sales
    productSales[name].units++;
    productSales[name].revenue += price;

    // Update table row
    const row = document.getElementById(`row-${name.replace(/\s+/g, '-')}`);
    row.cells[1].textContent = productSales[name].units;
    row.cells[2].textContent = productSales[name].revenue.toFixed(2);
  });
});
</script>
</body>
</html>
