<script>
let totalSales = 0;
const totalSalesDiv = document.getElementById('total-sales');
<button id="reset-btn">Reset All Sales</button>
const salesTableBody = document.querySelector('#sales-table tbody');
const resetBtn = document.getElementById('reset-btn');

// Load saved data OR initialize
let productSales = JSON.parse(localStorage.getItem('productSales')) || {};

// Initialize table + badges
document.querySelectorAll('.product').forEach(prod => {
  const name = prod.dataset.name;
  const price = parseFloat(prod.dataset.price);
  const badge = prod.querySelector('.badge');

  // If product not saved yet
  if (!productSales[name]) {
    productSales[name] = { units: 0, revenue: 0 };
  }

  // Set badge
  badge.textContent = productSales[name].units;

  // Create table row
  const row = document.createElement('tr');
  row.id = `row-${name.replace(/\s+/g, '-')}`;
  row.innerHTML = `
    <td>${name}</td>
    <td>${productSales[name].units}</td>
    <td>${productSales[name].revenue.toFixed(2)}</td>
  `;
  salesTableBody.appendChild(row);

  // Add sold styling if needed
  if (productSales[name].units > 0) {
    prod.classList.add('sold');
  }

  // Add to total
  totalSales += productSales[name].revenue;
});

// Update total display
totalSalesDiv.textContent = "Total Sales: $" + totalSales.toFixed(2);

// Handle selling
document.querySelectorAll('.sell-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const productDiv = btn.closest('.product');
    const name = productDiv.dataset.name;
    const price = parseFloat(productDiv.dataset.price);
    const badge = productDiv.querySelector('.badge');

    // Update data
    productSales[name].units++;
    productSales[name].revenue += price;

    // Update badge
    badge.textContent = productSales[name].units;

    // Highlight
    productDiv.classList.add('sold');

    // Update total
    totalSales += price;
    totalSalesDiv.textContent = "Total Sales: $" + totalSales.toFixed(2);

    // Update table
    const row = document.getElementById(`row-${name.replace(/\s+/g, '-')}`);
    row.cells[1].textContent = productSales[name].units;
    row.cells[2].textContent = productSales[name].revenue.toFixed(2);

    // SAVE to browser
    localStorage.setItem('productSales', JSON.stringify(productSales));
  });
});

// RESET BUTTON
resetBtn.addEventListener('click', () => {
  if (!confirm("Are you sure you want to reset all sales?")) return;

  localStorage.removeItem('productSales');
  location.reload();
});
</script>
