<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Store POS</title>
<!-- Link to external CSS -->
<link rel="stylesheet" href="store-pos.css">
</head>
<body>
<header>
  <h1>Store POS System</h1>
  <div class="top-bar">
    <div id="total-sales">$0.00</div>
    <button id="reset-btn">Reset</button>
  </div>
</header>

<main>
  <div class="products" id="products"></div>

  <details class="sales-summary" id="sales-summary" open>
    <summary>Sales Summary</summary>
    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Qty</th>
          <th>$</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </details>
</main>

<script>
// --- Products and images data ---
const products = [
  "Candy","Small Candy (2)","Soda","Gatorade","Water","Sunny D",
  "Capri Sun","Mac and Cheese","Ramen (Beef)","Ramen (Chicken)",
  "Cup Ramen","Apple Sauce","Chips"
];

const images = {
  Candy: "https://blogger.googleusercontent.com/img/a/AVvXsEjROa6luUZyaAiadXvmSDD72cu-22xQ1Jz_lyCwoPBS9HtW4FQgvfP1qYtftdZUq54eOReMToEpIN_YeThpPbwrhh-97_8arTn7ev31DVoebsQDUw-5nc6iM5io8TylesXDd-RPgVBWcIn4OyDLgi8GVpzntbVy-WNBLgVfQdTdgamAHp5x3lrCUC7B=s16000",
  "Small Candy (2)": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYZDw5J5J3oXft2LFBA7YPGLW5y0L0W936Jw&s",
  Soda: "https://i5.walmartimages.com/seo/Pack-22-Soda-Variety-Pack-8-Multi-Flavors-Soft-Drink-Bundle-Assortments-Cola-Pepsi-Sprite-Mountain-Dew-Dr-Pepper-Sunkist-Canada-Dry-Ginger-Ale-Brisk_baad71e0-1e81-47a4-b02e-bb641e894ac7.60d02c0a8bd27f1c76320b5d860e504a.jpeg?odnHeight=768&odnWidth=768&odnBg=FFFFFF",
  Gatorade: "https://www.gosupps.com/media/catalog/product/cache/25/small_image/1500x1650/9df78eab33525d08d6e5fb8d27136e95/6/1/61yX2ryRlNL.jpg",
  Water: "https://i5.walmartimages.com/asr/b5bc06f5-7208-4e64-ba92-7be43b474d16.5cbc4d93cd2d649a66a73b9e7250dc05.jpeg?odnHeight=768&odnWidth=768&odnBg=FFFFFF",
  "Sunny D": "https://www.alisonspantry.com/uploads/new-products/2924-p.jpg",
  "Capri Sun": "https://cdn11.bigcommerce.com/s-d3cmyrc51w/images/stencil/1180w/products/26844/94380/00087684002049_PRODUCT_IMAGE_10087684002046_A1CC__31874.1731300452.jpg?c=1",
  "Mac and Cheese": "https://restaurantandmore.com/media/catalog/product/cache/6e8e24cc73e2eff11526e72b5f24c033/0/0/00021000025763_product_image_00021000025763_a1c1.jpg",
  "Ramen (Beef)": "https://i5.walmartimages.com/seo/Maruchan-Ramen-Beef-Noodles-Soup-3-Oz-24-Ct_3b92f76a-0375-47ed-971d-e1d03b63e4c6.e9e8008d8f72f857cb4c01a75696c031.jpeg?odnHeight=573&odnWidth=573&odnBg=FFFFFF",
  "Ramen (Chicken)": "https://encrypted-tbn0.gstatic.com/shopping?q=tbn:ANd9GcSD5oWX5ndag8uBxaBr9RrkC4bDIODqIBrAipLz3Sy8zPhG16ZSs7oKXuE85XQyPV80KuRD4ZLCJhN7SXm086Wn-3zJmybE48tcy91X7axjNL7TBu9SrwGXR_8ashi6DTQQL0AjzorcOIg&usqp=CAc",
  "Cup Ramen": "https://platform.pdx.eater.com/wp-content/uploads/sites/29/chorus/uploads/chorus_asset/file/25359705/Screenshot_2024_03_26_at_4.19.01_PM.png?quality=90&strip=all&crop=0%2C12.35632183908%2C100%2C75.287356321839&w=750",
  "Apple Sauce": "https://i5.walmartimages.com/seo/Great-Value-Unsweetened-Apple-Sauce-Pouches-3-2-oz-50-Count_89eca5a7-3d9e-41a1-904e-5381e5ea9414.e75ae9a5521b432760729f63615a8ad6.jpeg?odnHeight=573&odnWidth=573&odnBg=FFFFFF",
  Chips: "https://www.2foodtrippers.com/wp-content/uploads/2023/02/American-Chip-Bags-1024x783.jpg"
};

const colors = {
  Candy: "#f28b82","Small Candy (2)":"#fbbc04",Soda:"#aecbfa",
  Gatorade:"#a7ffeb",Water:"#cbf0f8","Sunny D":"#fff475",
  "Capri Sun":"#d7aefb","Mac and Cheese":"#fdcfe8",
  "Ramen (Beef)":"#e6c9a8","Ramen (Chicken)":"#fddfcf",
  "Cup Ramen":"#e8eaed","Apple Sauce":"#ccff90",Chips:"#ffe6cc",
};

let data = JSON.parse(localStorage.getItem("sales")) || {};
let total = 0;

const productsDiv = document.getElementById("products");
const table = document.getElementById("table-body");
const totalDiv = document.getElementById("total-sales");

products.forEach(name => {
  if(!data[name]) data[name] = { units:0, revenue:0 };

  const div = document.createElement("div");
  div.className = "product";
  div.innerHTML = `
    <div class="badge">${data[name].units}</div>
    <img src="${images[name]}" alt="${name}" class="product-image" />
    <p>${name}</p>
    <button style="background-color:${colors[name]}">Sell $1</button>
  `;

  const btn = div.querySelector("button");
  const badge = div.querySelector(".badge");

  btn.onclick = () => {
    data[name].units++;
    data[name].revenue += 1;
    badge.textContent = data[name].units;
    total += 1;
    totalDiv.textContent = "$" + total.toFixed(2);
    updateTable(name);
    save();
  };

  productsDiv.appendChild(div);

  const row = document.createElement("tr");
  row.id = name;
  row.innerHTML = `<td>${name}</td><td>${data[name].units}</td><td>${data[name].revenue.toFixed(2)}</td>`;
  table.appendChild(row);

  total += data[name].revenue;
});

totalDiv.textContent = "$" + total.toFixed(2);

function updateTable(name){
  const row = document.getElementById(name);
  if(!row) return;
  row.children[1].textContent = data[name].units;
  row.children[2].textContent = data[name].revenue.toFixed(2);
}

function save(){
  localStorage.setItem("sales", JSON.stringify(data));
}

document.getElementById("reset-btn").onclick = () => {
  if(!confirm("Reset all sales?")) return;
  localStorage.clear();
  location.reload();
};
</script>
</body>
</html>
