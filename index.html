<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Store POS</title>

<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <h1>Store POS System</h1>
  <div class="top-bar">
    <div id="total-sales">$0.00</div>
    <button id="reset-btn">Reset</button>
  </div>
</header>

<main>
  <div class="products" id="products"></div>

  <details class="sales-summary" id="sales-summary" open>
    <summary>Sales Summary</summary>
    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Qty</th>
          <th>$</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </details>
</main>

<script>
  // PRODUCTS
  const products = [
    "Candy",
    "Small Candy (2)",
    "Soda",
    "Gatorade",
    "Water",
    "Sunny D",
    "Capri Sun",
    "Mac and Cheese",
    "Ramen (Beef)",
    "Ramen (Chicken)",
    "Cup Ramen",
    "Apple Sauce",
    "Chips",
  ];

  // IMAGE URLs for each product (replace with your own image URLs as needed)
  const images = {
    Candy: "https://i.imgur.com/4bQ9c2R.png",               // candy image
    "Small Candy (2)": "https://i.imgur.com/q5H9v0V.png",  // small candy image
    Soda: "https://i.imgur.com/7FJ07pG.png",                // soda bottle
    Gatorade: "https://i.imgur.com/E47sUQP.png",            // gatorade bottle
    Water: "https://i.imgur.com/jGDSChW.png",               // water bottle
    "Sunny D": "https://i.imgur.com/yTyxQcE.png",           // orange juice box
    "Capri Sun": "https://i.imgur.com/MHPwLnB.png",         // capri sun pouch
    "Mac and Cheese": "https://i.imgur.com/Y0dHtL5.png",    // mac and cheese cup
    "Ramen (Beef)": "https://i.imgur.com/9bcd1vQ.png",      // ramen bowl beef
    "Ramen (Chicken)": "https://i.imgur.com/rAO0yZn.png",   // ramen bowl chicken
    "Cup Ramen": "https://i.imgur.com/cC4YXNZ.png",         // cup ramen
    "Apple Sauce": "https://i.imgur.com/fUNz3mD.png",       // applesauce cup
    Chips: "https://i.imgur.com/UvSq9bL.png",                // chips bag
  };

  // BUTTON COLORS (keep them for buttons)
  const colors = {
    Candy: "#f28b82",
    "Small Candy (2)": "#fbbc04",
    Soda: "#aecbfa",
    Gatorade: "#a7ffeb",
    Water: "#cbf0f8",
    "Sunny D": "#fff475",
    "Capri Sun": "#d7aefb",
    "Mac and Cheese": "#fdcfe8",
    "Ramen (Beef)": "#e6c9a8",
    "Ramen (Chicken)": "#fddfcf",
    "Cup Ramen": "#e8eaed",
    "Apple Sauce": "#ccff90",
    Chips: "#ffe6cc",
  };

  let data = JSON.parse(localStorage.getItem("sales")) || {};
  let total = 0;

  const productsDiv = document.getElementById("products");
  const table = document.getElementById("table-body");
  const totalDiv = document.getElementById("total-sales");

  products.forEach((name) => {
    if (!data[name]) data[name] = { units: 0, revenue: 0 };

    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <div class="badge">${data[name].units}</div>
      <img src="${images[name]}" alt="${name}" class="product-image" />
      <p>${name}</p>
      <button style="background-color:${colors[name]}">Sell $1</button>
    `;

    const btn = div.querySelector("button");
    const badge = div.querySelector(".badge");

    btn.onclick = () => {
      data[name].units++;
      data[name].revenue += 1;

      badge.textContent = data[name].units;

      total += 1;
      totalDiv.textContent = "$" + total.toFixed(2);

      updateTable(name);
      save();
    };

    productsDiv.appendChild(div);

    const row = document.createElement("tr");
    row.id = name;
    row.innerHTML = `
      <td>${name}</td>
      <td>${data[name].units}</td>
      <td>${data[name].revenue.toFixed(2)}</td>
    `;
    table.appendChild(row);

    total += data[name].revenue;
  });

  totalDiv.textContent = "$" + total.toFixed(2);

  function updateTable(name) {
    const row = document.getElementById(name);
    if (!row) return;
    row.children[1].textContent = data[name].units;
    row.children[2].textContent = data[name].revenue.toFixed(2);
  }

  function save() {
    localStorage.setItem("sales", JSON.stringify(data));
  }

  document.getElementById("reset-btn").onclick = () => {
    if (!confirm("Reset all sales?")) return;
    localStorage.clear();
    location.reload();
  };
</script>
</body>
</html>
